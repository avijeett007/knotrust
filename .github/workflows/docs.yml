name: Deploy docs site

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"
  # Allows manually re-running a deployment from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment, but do not cancel an in-progress run —
# let it finish so a Pages deployment never gets left half-published.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build VitePress site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies (website/ only — isolated from the root pnpm workspace)
        working-directory: website
        run: npm ci

      - name: Build the site
        working-directory: website
        run: npx vitepress build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
