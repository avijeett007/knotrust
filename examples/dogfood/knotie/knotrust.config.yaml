# KnoTrust dogfood config — a local Knotie MCP path (P0-E9-T2, R156).
#
# HONEST SCOPE (read examples/dogfood/README.md first): this is the
# hand-reviewed, buildable config for wrapping a local Knotie MCP path with
# `knotrust --`. It has NOT been run against the real Knotie path in this
# repo — that system lives outside this build repo/environment. It IS
# exercised for real, end-to-end, against the E11-T1 test harness's fake MCP
# server (configured with this exact tool surface) by
# test/adversarial/src/dogfood.e2e.test.ts.
#
# Knotie is also the future voice-surface muscle memory (P0-E9-T2's second
# purpose): a personal-assistant-style tool surface is exactly the shape a
# voice front-end would drive later (Phase 2, PWA/SMS notifier, brief §E2's
# fourth outcome `deferred_not_eligible`). See VOICE-FINDINGS.md in this
# directory for the concrete trigger case this dogfood pass identified —
# nothing below builds voice; this config only tiers the tool surface a
# future voice adapter would call through the same proxy.
#
# Tiers are hand-reviewed per the same read/write/critical-action discipline
# as the OpenClaw config (see that file's header for the `source` markers'
# meaning): read-only assistant actions land `routine`, anything that
# messages/mutates another person's state lands `sensitive`, and anything
# moving money or deleting an account lands `critical` — hand-pinned, never
# annotation- or pack-seeded.
version: 1
scope: personal
identity:
  subjectId: avijeett007@gmail.com
  subjectType: user
servers:
  knotie:
    tools:
      # --- routine: read-only assistant queries ---
      knotie.get_calendar:
        tier: routine
        source: annotation
      knotie.read_reminders:
        tier: routine
        source: annotation
      knotie.check_balance:
        tier: routine
        source: annotation
      # --- sensitive: sends/mutates on the user's behalf; requestable ---
      knotie.send_message:
        tier: sensitive
        source: pack
      knotie.update_contact:
        tier: sensitive
        source: pack
      # --- critical: moves money / destroys an account; always held for
      #     human approval — `knotie.transfer_funds` is this dogfood pass's
      #     concrete deferred_not_eligible trigger case, see VOICE-FINDINGS.md ---
      knotie.transfer_funds:
        tier: critical
        source: user
      knotie.delete_account:
        tier: critical
        source: user
unknownToolTier: sensitive
approvalTimeoutSeconds: 300
