<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1592 380" role="img" aria-labelledby="knotrust-wordmark-title">
  <title id="knotrust-wordmark-title">KnoTrust</title>
  <!--
    KnoTrust lockup — mark + wordmark, for README headers / site nav.

    "KnoTrust" is set as outlined paths (not live <text>) so it renders
    identically everywhere — GitHub, browsers, docs generators — regardless
    of installed fonts. Source face: a bold geometric grotesque (system DIN
    Alternate Bold), traced to paths at build time; no font file is embedded
    or required to render this SVG. Mixed case is deliberate: it keeps the
    "Kno" + "Trust" seam in the name visible, the same device GitHub/PayPal
    use for compound names.

    For a dark surface, swap fill="#14131C" (both the ink loop and the
    wordmark path) for the paper token #F5F4F0 — see BRAND.md.
  -->
  <g transform="translate(40 40) scale(0.585938)">
    <g stroke-linecap="round" fill="none" transform="rotate(32 256 256)">
      <path d="M 276.22 364.71 A 140 140 0 1 1 276.22 147.29" stroke="#14131C" stroke-width="70"/>
      <path d="M 235.78 147.29 A 140 140 0 1 1 235.78 364.71" stroke="#E7A93A" stroke-width="70"/>
      <path d="M 226.73 121.46 A 140 140 0 0 1 281.79 152.06" stroke="#14131C" stroke-width="70"/>
    </g>
  </g>
